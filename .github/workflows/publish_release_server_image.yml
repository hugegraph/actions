name: "Publish server image(release)"

on:
  workflow_dispatch:
    inputs:
      branch:
        required: true
        default: ''
        description: 'The branch name should be like *-x.x.x, for example release-1.0.0'
      mvn_args:
        required: false
        default: ''
        description: 'mvn build args, like "MAVEN_ARGS=-P stage"'

jobs:
  publish:
    uses: ./.github/workflows/_publish_image_reusable.yml
    with:
      mode: release
      component: server
      repository_url: apache/hugegraph
      branch: ${{ inputs.branch }}
      build_matrix_json: |
        [
          {
            "module": "server",
            "context": ".",
            "dockerfile": "./hugegraph-server/Dockerfile",
            "image_repo_latest": "hugegraph/hugegraph",
            "image_repo_release": "hugegraph/hugegraph",
            "platforms_latest": "linux/amd64,linux/arm64",
            "platforms_release": "linux/amd64,linux/arm64",
            "smoke_test": true,
            "smoke_test_cmd": "docker rm -f graph >/dev/null 2>&1 || true; docker run -itd --name=graph -p 18080:8080 $IMAGE_URL; sleep 20s; curl -fsS http://127.0.0.1:18080 >/dev/null || exit 1; docker ps -a; sleep 20s; curl -fsS http://127.0.0.1:18080 >/dev/null || exit 1; docker ps -a"
          }
        ]
      use_mvn_args: true
      mvn_args: ${{ inputs.mvn_args }}
    secrets: inherit

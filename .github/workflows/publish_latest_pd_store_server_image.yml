name: "Publish pd-store-server image(latest)"

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      mvn_args:
        required: false
        default: ''
        description: 'mvn build args, like "MAVEN_ARGS=-P stage"'
      strict_mode:
        type: boolean
        required: false
        default: true
        description: 'whether integration precheck is mandatory before publish'
      wait_timeout_sec:
        required: false
        default: '300'
        description: 'docker compose wait timeout in seconds for precheck/self-check'

concurrency:
  group: publish-latest-pd-store-server
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/_publish_pd_store_server_reusable.yml
    with:
      mode: latest
      repository_url: apache/hugegraph
      branch: master
      mvn_args: ${{ github.event.inputs.mvn_args || '' }}
      strict_mode: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.strict_mode == true || github.event.inputs.strict_mode == 'true' }}
      wait_timeout_sec: ${{ github.event.inputs.wait_timeout_sec || '300' }}
      enable_hash_gate: true
      last_hash_value: ${{ vars.LAST_SERVER_HASH }}
      last_hash_name: LAST_SERVER_HASH
      hash_repo_owner: hugegraph
      hash_repo_name: actions
    secrets: inherit

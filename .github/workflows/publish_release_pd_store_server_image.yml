name: "Publish pd-store-server image(release)"

on:
  workflow_dispatch:
    inputs:
      branch:
        required: true
        default: ''
        description: 'The branch name should be like *-x.x.x, for example release-1.0.0'
      mvn_args:
        required: false
        default: ''
        description: 'mvn build args, like "MAVEN_ARGS=-P stage"'
      strict_mode:
        type: boolean
        required: false
        default: true
        description: 'whether integration precheck is mandatory before publish'
      wait_timeout_sec:
        required: false
        default: '300'
        description: 'docker compose wait timeout in seconds for precheck/self-check'

concurrency:
  group: publish-release-pd-store-server
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/_publish_pd_store_server_reusable.yml
    with:
      mode: release
      repository_url: apache/hugegraph
      branch: ${{ inputs.branch }}
      mvn_args: ${{ inputs.mvn_args }}
      strict_mode: ${{ inputs.strict_mode }}
      wait_timeout_sec: ${{ inputs.wait_timeout_sec || '300' }}
      enable_hash_gate: false
    secrets: inherit
